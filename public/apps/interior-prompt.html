<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>室内写实摄影 - 提示词生成器</title>
    <style>
        :root {
            --primary: #2c3e50;
            --bg: #f0f2f5;
            --border: #d9d9d9;
            --radius: 6px;
            --accent: #1890ff;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--primary);
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            gap: 20px;
        }
        .form-section {
            flex: 1.3;
            background: #fff;
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            min-height: calc(100vh - 40px);
            overflow-y: visible;
        }
        .output-section {
            flex: 1;
            background: #fff;
            padding: 25px;
            border-radius: var(--radius);
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
        }
        h2 { font-size: 1.3rem; margin-top: 0; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
        h3 { font-size: 1rem; margin: 24px 0 12px 0; color: #1890ff; border-left: 3px solid #1890ff; padding-left: 10px; line-height: 1.2; }
        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .row .form-group { flex: 1; }
        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.85rem; margin-bottom: 6px; font-weight: 600; color: #555; }
        select, input[type="text"] {
            width: 100%; padding: 8px 10px; border: 1px solid var(--border);
            border-radius: 4px; font-size: 0.9rem; box-sizing: border-box;
            background-color: #fafafa; transition: border 0.3s;
        }
        select:focus, input[type="text"]:focus { border-color: var(--accent); outline: none; background: #fff;}
        .custom-input { margin-top: 8px; display: none; background-color: #fffbdd !important; border-color: #fadb14 !important; }
        .hint { font-size: 0.8rem; color: #999; margin-top: -6px; margin-bottom: 10px; }
        pre {
            background: #1e1e1e; color: #d4d4d4; padding: 20px; border-radius: var(--radius);
            overflow-x: auto; flex-grow: 1; font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap;
            margin-top: 0;
        }
        .btn {
            background: var(--accent); color: #fff; border: none; padding: 12px 20px;
            border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: 500;
            transition: all 0.2s; width: 100%; margin-top: 15px;
        }
        .btn:hover { background: #40a9ff; }
        .btn.success { background: #52c41a; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
    </style>
<link rel="stylesheet" href="./app-theme.css?v=20260701-publish">
</head>
<body>

    <div class="form-section">
        <h2>参数配置面板</h2>
        
        <h3>1. 基础信息</h3>
        <div class="row">
            <div class="form-group">
                <label>输入源 (A项)</label>
                <select id="projSource">
                    <option value="su室内截图">SU室内截图</option>
                    <option value="室内效果图">室内效果图</option>
                    <option value="室内实景照片">室内实景照片</option>
                    <option value="su室内线稿">SU室内线稿</option>
                </select>
            </div>
            <div class="form-group">
                <label>具体场景 (B项)</label>
                <input type="text" id="projScene" value="中古客厅" placeholder="例如：中古客厅 / 适老化长辈房">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>设计风格</label>
                <select id="designStyle" onchange="toggleCustom('designStyle', 'designStyleCustom')">
                    <option value="中古复古风 (Mid-Century Modern)">中古复古风 (Mid-Century)</option>
                    <option value="现代简约 (Modern Minimalist)">现代简约 (Modern)</option>
                    <option value="法式奶油风 (French Cream Style)">法式奶油风 (French Cream)</option>
                    <option value="适老化无障碍设计 (Age-friendly Design)">适老化无障碍设计 (Age-friendly)</option>
                    <option value="侘寂风 (Wabi-Sabi)">侘寂风 (Wabi-Sabi)</option>
                    <option value="新中式 (New Chinese Style)">新中式 (New Chinese Style)</option>
                    <option value="工业风 (Industrial)">工业风 (Industrial)</option>
                    <option value="custom">✍️ 自定义输入...</option>
                </select>
                <input type="text" id="designStyleCustom" class="custom-input" placeholder="请输入自定义风格...">
            </div>
            <div class="form-group">
                <label>核心空间约束 (已锁定)</label>
                <select id="coreConstraint" disabled style="background-color: #eee; color: #666;">
                    <option value="interior">室内专属 (严格保持布局与家具完整)</option>
                </select>
            </div>
        </div>

        <h3>2. 场景与环境</h3>
        <div class="row">
            <div class="form-group">
                <label>时间设定</label>
                <select id="envTime" onchange="toggleCustom('envTime', 'envTimeCustom')">
                    <option value="清晨 (Morning)，晨光微露">清晨 (晨光微露)</option>
                    <option value="午后 (Afternoon)，阳光明媚">午后 (阳光明媚)</option>
                    <option value="黄昏/日落 (Golden Hour)，夕阳余晖">黄昏/日落 (Golden Hour)</option>
                    <option value="蓝调时刻 (Blue Hour)，冷色调天空">蓝调时刻 (Blue Hour)</option>
                    <option value="深夜 (Night)，夜景灯光">深夜 (夜景灯光)</option>
                    <option value="custom">✍️ 自定义输入...</option>
                </select>
                <input type="text" id="envTimeCustom" class="custom-input" placeholder="请输入自定义时间...">
            </div>
            <div class="form-group">
                <label>天气/外景状态</label>
                <select id="envWeather">
                    <option value="晴空万里，阳光充足，光影清晰">晴空万里，光影清晰</option>
                    <option value="雨后初晴，空气湿润通透，室外光线柔和">雨后初晴，室外光柔和</option>
                    <option value="阴天，柔和的漫反射天光，无硬阴影">阴天，柔和漫反射</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>窗外配景</label>
            <select id="envView" onchange="toggleCustom('envView', 'envViewCustom')">
                <option value="繁华的现代城市天际线">繁华的现代城市天际线</option>
                <option value="茂密的亚热带阔叶植物">茂密的室外庭院绿植</option>
                <option value="充满烟火气的老城街巷">充满烟火气的老城街巷</option>
                <option value="连绵的远山与自然海景">连绵的远山与自然海景</option>
                <option value="无窗景/全封闭空间">无窗景 (全封闭空间)</option>
                <option value="custom">✍️ 自定义输入...</option>
            </select>
            <input type="text" id="envViewCustom" class="custom-input" placeholder="请输入自定义窗外配景...">
        </div>

        <h3>3. 光效控制</h3>
        <div class="row">
            <div class="form-group">
                <label>室内人工光类型</label>
                <select id="lightIndoor">
                    <option value="无主灯设计，洗墙灯与局部射灯开启">无主灯设计，洗墙灯与射灯开启</option>
                    <option value="纯粹依靠自然天光，无人工光源">纯自然天光，无人工光源</option>
                    <option value="温暖的落地灯与壁灯点缀照明">温暖落地灯与壁灯点缀</option>
                    <option value="全屋基础照明全开，光线均匀">全屋基础照明全开</option>
                </select>
            </div>
            <div class="form-group">
                <label>室内光源色温</label>
                <select id="lightTemp">
                    <option value="3000K 暖白光 (温馨舒适)">3000K 暖白光 (温馨舒适)</option>
                    <option value="2700K 暖黄光 (复古慵懒)">2700K 暖黄光 (复古慵懒)</option>
                    <option value="4000K 自然白 (明亮克制)">4000K 自然白 (明亮克制)</option>
                    <option value="纯自然天光，无需人工色温">纯自然天光，无需设定</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>光影品质控制 (专业预设)</label>
            <select id="lightQuality" onchange="toggleCustom('lightQuality', 'lightQualityCustom')">
                <option value="柔和漫反射，真实阴影层次，高动态光影对比，形成顶级的冷暖光影对冲">顶级冷暖对冲，真实阴影层次 (推荐)</option>
                <option value="极简高反差，硬朗的光影边界，黑白灰层次分明，具有戏剧化的光影张力">极简高反差，戏剧化硬朗光影</option>
                <option value="全局光照 (GI) 细腻，全屋均匀漫反射，暗部细节丰富且无死黑，亮部通透不过曝">全局光照 (GI) 均匀通透，无死黑</option>
                <option value="丁达尔效应，清晰的体积光从窗户透入，具有极强的空气氛围感和微尘质感">丁达尔体积光，强空气感</option>
                <option value="电影级暗调 (Low-Key)，压暗整体环境光，利用重点光源凸显材质质感，氛围神秘高级">电影级暗调 (Low-Key)，突出局部质感</option>
                <option value="custom">✍️ 自定义输入...</option>
            </select>
            <input type="text" id="lightQualityCustom" class="custom-input" placeholder="请输入自定义光影品质...">
        </div>

        <h3>4. 材质与细节 (5维控制)</h3>
        <div class="row">
            <div class="form-group">
                <label>墙面</label>
                <select id="m_wall" onchange="toggleCustom('m_wall', 'm_wallCustom')">
                    <option value="米色肌理乳胶漆">米色肌理乳胶漆</option>
                    <option value="温润胡桃木饰面">温润胡桃木饰面</option>
                    <option value="微水泥材质，带手工抹痕">微水泥材质，带手工抹痕</option>
                    <option value="复古红砖墙面">复古红砖墙面</option>
                    <option value="大理石奢石岩板">大理石奢石岩板</option>
                    <option value="空">不需要(留空)</option>
                    <option value="custom">✍️ 自定义输入...</option>
                </select>
                <input type="text" id="m_wallCustom" class="custom-input" placeholder="请输入墙面材质...">
            </div>
            <div class="form-group">
                <label>顶面 (天花)</label>
                <select id="m_ceiling" onchange="toggleCustom('m_ceiling', 'm_ceilingCustom')">
                    <option value="纯白平顶乳胶漆">纯白平顶乳胶漆</option>
                    <option value="极简反光灯槽吊顶">极简反光灯槽吊顶</option>
                    <option value="原木格栅吊顶">原木格栅吊顶</option>
                    <option value="裸露管线工业风天花">裸露管线工业风天花</option>
                    <option value="空">不需要(留空)</option>
                    <option value="custom">✍️ 自定义输入...</option>
                </select>
                <input type="text" id="m_ceilingCustom" class="custom-input" placeholder="请输入顶面材质...">
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>地面</label>
                <select id="m_floor" onchange="toggleCustom('m_floor', 'm_floorCustom')">
                    <option value="哑光防滑柔光砖">哑光防滑柔光砖</option>
                    <option value="鱼骨拼实木地板">鱼骨拼实木地板</option>
                    <option value="无缝水磨石地面">无缝水磨石地面</option>
                    <option value="自流平水泥地面">自流平水泥地面</option>
                    <option value="空">不需要(留空)</option>
                    <option value="custom">✍️ 自定义输入...</option>
                </select>
                <input type="text" id="m_floorCustom" class="custom-input" placeholder="请输入地面材质...">
            </div>
            <div class="form-group">
                <label>核心软装家具</label>
                <select id="m_furniture" onchange="toggleCustom('m_furniture', 'm_furnitureCustom')">
                    <option value="胡桃木实木柜体，焦糖色复古真皮沙发">实木柜，焦糖色真皮沙发</option>
                    <option value="米白羊羔绒布艺沙发，极简大理石茶几">羊羔绒沙发，大理石茶几</option>
                    <option value="拉丝黑钛金属配件，透明亚克力单椅">金属配件，亚克力单椅</option>
                    <option value="空">不需要(留空)</option>
                    <option value="custom">✍️ 自定义输入...</option>
                </select>
                <input type="text" id="m_furnitureCustom" class="custom-input" placeholder="请输入核心家具材质...">
            </div>
        </div>
        <div class="form-group">
            <label>其他细节补充 (五金/绿植/配饰等)</label>
            <select id="m_other" onchange="toggleCustom('m_other', 'm_otherCustom')">
                <option value="拉丝黄铜质感五金，尤加利叶玻璃花瓶配饰">拉丝黄铜五金，玻璃花瓶配饰</option>
                <option value="大型天堂鸟室内绿植，厚重的亚麻窗帘">大型室内绿植，亚麻窗帘</option>
                <option value="包豪斯风格中古台灯，金属边框艺术挂画">中古台灯，艺术挂画</option>
                <option value="空">不需要(留空)</option>
                <option value="custom">✍️ 自定义输入...</option>
            </select>
            <input type="text" id="m_otherCustom" class="custom-input" placeholder="请输入其他细节补充...">
        </div>

        <h3>5. 摄影参数 & 后期表现</h3>
        <div class="row">
            <div class="form-group">
                <label>相机型号</label>
                <select id="camModel">
                    <option value="佳能EOS R6 (色彩温润)">佳能EOS R6 (色彩温润)</option>
                    <option value="尼康Z9 (高解析锐利)">尼康Z9 (高解析锐利)</option>
                    <option value="索尼A7RM5 (极致宽容度)">索尼A7RM5 (极致宽容度)</option>
                    <option value="哈苏中画幅 (顶级色彩过渡)">哈苏中画幅 (顶级色彩)</option>
                </select>
            </div>
            <div class="form-group">
                <label>拍摄技术 (镜头/曝光)</label>
                <select id="camTech">
                    <option value="f/8光圈全景深，包围曝光 (HDR) 保留暗部细节">f/8全景深，包围曝光(HDR)</option>
                    <option value="移轴镜头，修正建筑与室内透视畸变，保证垂直线条绝对平直">移轴镜头，修正透视畸变</option>
                    <option value="f/1.4大光圈，极浅景深，聚焦局部材质特写，背景虚化">f/1.4大光圈，局部特写虚化</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="form-group">
                <label>人物表现 (空间生动感)</label>
                <select id="camPeople">
                    <option value="空景，无人物">空景，无人物</option>
                    <option value="长曝光下的人物虚影，拖尾效果，体现空间的流动感与生活气息">长曝光人物虚影 (强烈推荐)</option>
                    <option value="清晰的驻足人物，作为画面比例尺">清晰的驻足人物 (比例尺)</option>
                </select>
            </div>
            <div class="form-group">
                <label>渲染精度</label>
                <select id="renderQuality">
                    <option value="超高分辨率 (8K)，质感通透，PBR物理级真实室内材质">8K PBR物理级真实</option>
                    <option value="4K 商业交付级，电影级高对比度，无噪点">4K 商业交付级</option>
                    <option value="UE5 虚幻引擎级别的实时光线追踪室内质感">UE5 室内光追质感</option>
                </select>
            </div>
        </div>
    </div>

    <div class="output-section">
        <h2>JSON 提示词预览</h2>
        <pre id="jsonOutput" class="protected-output"></pre>
    </div>

    <script>
        // 控制自定义输入框的显示与隐藏
        function toggleCustom(selectId, inputId) {
            const select = document.getElementById(selectId);
            const input = document.getElementById(inputId);
            if (select.value === 'custom') {
                input.style.display = 'block';
                input.focus();
            } else {
                input.style.display = 'none';
            }
            generateJSON();
        }

        // 获取最终值（如果是自定义，则取输入框的值）
        function getFinalValue(selectId, inputId) {
            const select = document.getElementById(selectId);
            if (select.value === 'custom') {
                return document.getElementById(inputId).value;
            }
            return select.value;
        }

        function generateJSON() {
            const projName = `${document.getElementById('projSource').value} - ${document.getElementById('projScene').value}`;
            
            // 锁定室内约束逻辑
            const coreObj = {
                "几何保真度": "严格保持原始 su 场景结构、物体位置和几何形状，严禁改变空间布局。",
                "物体完整性": "保持所有家具、灯具和装饰品的原始样式与比例。",
                "转换逻辑": "将基础模型面转换为高精度、符合物理规律的真实室内材质 (PBR)。"
            };

            // 获取带自定义功能的选项值
            const styleVal = getFinalValue('designStyle', 'designStyleCustom');
            const timeVal = getFinalValue('envTime', 'envTimeCustom');
            const viewVal = getFinalValue('envView', 'envViewCustom');
            const lightQualityVal = getFinalValue('lightQuality', 'lightQualityCustom');
            
            // 获取材质值
            const wallVal = getFinalValue('m_wall', 'm_wallCustom');
            const ceilingVal = getFinalValue('m_ceiling', 'm_ceilingCustom');
            const floorVal = getFinalValue('m_floor', 'm_floorCustom');
            const furnVal = getFinalValue('m_furniture', 'm_furnitureCustom');
            const otherVal = getFinalValue('m_other', 'm_otherCustom');

            // 组装 JSON 基础框架 (去除地点)
            const data = {
                "项目名称": projName,
                "设计风格": styleVal,
                "核心约束": coreObj,
                "场景与环境": {
                    "时间": timeVal,
                    "天气与外景": document.getElementById('envWeather').value,
                    "窗外配景": viewVal
                },
                "光效控制": {
                    "室内人工光": document.getElementById('lightIndoor').value,
                    "室内色温": document.getElementById('lightTemp').value,
                    "光影品质": lightQualityVal
                },
                "摄影与后期": {
                    "相机与成像": document.getElementById('camModel').value,
                    "拍摄技术": document.getElementById('camTech').value,
                    "渲染精度": document.getElementById('renderQuality').value
                }
            };

            // 动态加入人物表现
            const people = document.getElementById('camPeople').value;
            if (people !== "空景，无人物") {
                data["摄影与后期"]["人物表现"] = people;
            }

            // 处理五维材质（过滤掉选“空”的或者没填的）
            const materials = {};
            if (wallVal && wallVal !== '空') materials["墙面"] = wallVal;
            if (ceilingVal && ceilingVal !== '空') materials["顶面(天花)"] = ceilingVal;
            if (floorVal && floorVal !== '空') materials["地面"] = floorVal;
            if (furnVal && furnVal !== '空') materials["核心家具"] = furnVal;
            if (otherVal && otherVal !== '空') materials["细节补充"] = otherVal;

            if (Object.keys(materials).length > 0) {
                const newData = {};
                for (let key in data) {
                    newData[key] = data[key];
                    if (key === '光效控制') {
                        newData["材质与细节"] = materials; // 插入在光效控制之后
                    }
                }
                document.getElementById('jsonOutput').textContent = JSON.stringify(newData, null, 2);
                return JSON.stringify(newData, null, 2);
            }

            const jsonString = JSON.stringify(data, null, 2);
            document.getElementById('jsonOutput').textContent = jsonString;
            return jsonString;
        }

        // 监听所有输入与选择事件，实时更新 JSON
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('input', generateJSON);
            element.addEventListener('change', generateJSON);
        });

        // 初始化
        generateJSON();
    </script>
